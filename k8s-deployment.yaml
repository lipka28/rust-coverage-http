apiVersion: v1
kind: Namespace
metadata:
  name: coverage-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-coverage-demo
  namespace: coverage-demo
  labels:
    app: rust-coverage-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rust-coverage-demo
  template:
    metadata:
      labels:
        app: rust-coverage-demo
    spec:
      containers:
        - name: app
          image: rust-coverage-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 9095
              name: coverage
          env:
            - name: APP_PORT
              value: "8000"
            - name: COVERAGE_PORT
              value: "9095"
            - name: RUST_LOG
              value: "info"
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: rust-coverage-demo
  namespace: coverage-demo
spec:
  type: NodePort
  selector:
    app: rust-coverage-demo
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
    - name: coverage
      port: 9095
      targetPort: 9095
      nodePort: 30095
